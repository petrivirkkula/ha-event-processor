apiVersion: v1
kind: ServiceAccount
metadata:
  name: ha_event_processor
  namespace: default
  labels:
    app: ha_event_processor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ha_event_processor
  namespace: default
  labels:
    app: ha_event_processor
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ha_event_processor
  namespace: default
  labels:
    app: ha_event_processor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ha_event_processor
subjects:
- kind: ServiceAccount
  name: ha_event_processor
  namespace: default

