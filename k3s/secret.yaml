apiVersion: v1
kind: Secret
metadata:
  name: ha_event_processor-secrets
  namespace: default
  labels:
    app: ha_event_processor
type: Opaque
data:
  # MQTT Credentials (base64 encoded)
  # To create: echo -n "username" | base64
  mqtt_username: "" # base64 encoded MQTT username
  mqtt_password: "" # base64 encoded MQTT password

  # GCP Service Account JSON (base64 encoded)
  # To create: cat service-account.json | base64
  gcp_service_account_json: "" # base64 encoded GCP service account JSON

